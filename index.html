<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticketreat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .box {
      padding: 40px 24px;
      max-width: 700px;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      color: #cfcfcf;
      line-height: 1.6;
    }
    .tag {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 16px;
      border: 1px solid #444;
      border-radius: 999px;
      color: #adff2f;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Ticketreat 🎬</h1>
    <p>Your movie discovery platform is getting ready.</p>
    <div class="tag">First live test on GitHub Pages</div>
  </div>
</body>
</html>
